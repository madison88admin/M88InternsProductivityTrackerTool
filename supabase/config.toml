
[functions.send-notification]
enabled = true
verify_jwt = true
import_map = "./functions/send-notification/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/send-notification/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/send-notification/*.html" ]

[functions.invite-user]
enabled = true
verify_jwt = false
entrypoint = "./functions/invite-user/index.ts"

[functions.validate-invite-token]
enabled = true
verify_jwt = false
entrypoint = "./functions/validate-invite-token/index.ts"

[functions.complete-invite]
enabled = true
verify_jwt = false
entrypoint = "./functions/complete-invite/index.ts"

[functions.admin-setup]
enabled = true
verify_jwt = false
entrypoint = "./functions/admin-setup/index.ts"
